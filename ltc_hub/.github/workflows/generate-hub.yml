name: Generate Hub & Deploy Preview

on:
  push:
    branches-ignore:
      - main
  
  pull_request:
    branches:
      - main
  
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Generate hub
        env:
          MORTA_API_TOKEN: ${{ secrets.MORTA_API_TOKEN }}
        run: python generate_hub_github.py
      
      - name: Upload generated hub artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub-preview
          path: |
            index.html
            styles/
            scripts/
