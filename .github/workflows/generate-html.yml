name: 🧪 Test Generate HTML on Feature Branches Only

on:
  push:
    # Run only on branches **except** main
    branches-ignore:
      - main

  pull_request:
    # Optional: Run on PRs targeting main if you want to test before merging
    branches:
      - main

  workflow_dispatch:  # allow manual runs too

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python script
        env:
          API_TOKEN: ${{ secrets.MORTA_API_KEY }}
        run: python generate_tiles_html.py

      - name: Upload generated HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-html-preview
          path: |
            index.html
            styles/
            scripts/3
